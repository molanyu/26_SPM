name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Run unified test suite
        run: python run_tests.py

  postgres-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: spm
          POSTGRES_USER: spm
          POSTGRES_PASSWORD: spm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spm -d spm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://spm:spm@127.0.0.1:5432/spm
      POSTGRES_REGRESSION_URL: postgresql+psycopg://spm:spm@127.0.0.1:5432/spm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - name: Run PostgreSQL smoke regression
        run: python run_tests.py --suite postgres
