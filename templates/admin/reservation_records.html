<section class="panel-grid" data-template="admin-reservation-records">
  <article class="panel">
    <div class="section-head">
      <div>
        <h3>筛选条件</h3>
        <p>支持按用户、房间、座位、状态和日期范围查询预约记录，结果直接来自公开预约查询服务。</p>
      </div>
    </div>
    <form method="get" action="/admin/reservations/records" class="filter-bar">
      <div class="fields">
        <label>用户 ID<input name="user_id" value="{{ filter_user_id }}"></label>
        <label>自习室 ID<input name="room_id" value="{{ filter_room_id }}"></label>
        <label>座位 ID<input name="seat_id" value="{{ filter_seat_id }}"></label>
        <label>预约状态<select name="status">{{{ filter_status_options_html }}}</select></label>
        <label>开始日期<input type="date" name="date_from" value="{{ filter_date_from }}"></label>
        <label>结束日期<input type="date" name="date_to" value="{{ filter_date_to }}"></label>
        <label>页码<input type="number" min="1" name="page" value="{{ filter_page }}"></label>
        <label>每页条数<input type="number" min="1" name="page_size" value="{{ filter_page_size }}"></label>
      </div>
      <div class="form-actions"><button class="secondary" type="submit">查询记录</button></div>
    </form>
  </article>

  <article class="panel">
    <div class="section-head">
      <div>
        <h3>预约记录</h3>
        <p class="muted">共 {{ reservations_total }} 条记录</p>
      </div>
      <div class="actions">
        <a class="action-link secondary-link" href="/admin/reservations/actions">前往代理预约</a>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>预约 ID</th>
            <th>用户</th>
            <th>自习室</th>
            <th>座位</th>
            <th>状态</th>
            <th>开始时间</th>
            <th>结束时间</th>
            <th>创建来源</th>
          </tr>
        </thead>
        <tbody>{{{ reservation_rows_html }}}</tbody>
      </table>
    </div>
  </article>
</section>
